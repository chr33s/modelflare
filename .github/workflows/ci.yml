name: CI

permissions: {}

on:
  push:
    branches:
      - main
    paths:
      - package.json
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  NODE_VERSION: 22.18.0

jobs:
  check:
    name: Check version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_changed: ${{ steps.version.outputs.changed }}
      is_pre_release: ${{ steps.version.outputs.is_pre_release }}
      tag_name: ${{ steps.version.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Read package version
        id: version
        run: |
          version="$(node -p "require('./package.json').version")"

          if [[ "$version" == *-* ]]; then
            echo "GitHub Actions release flow does not support semver prerelease suffixes for VS Code extensions: $version" >&2
            exit 1
          fi

          previous_version=""
          if [[ "${{ github.event_name }}" == "push" ]] && [[ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            if git show "${{ github.event.before }}:package.json" >/dev/null 2>&1; then
              previous_version="$(git show "${{ github.event.before }}:package.json" | node -p "JSON.parse(require('fs').readFileSync(0, 'utf8')).version")"
            fi
          fi

          changed=false
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]] || [[ "$version" != "$previous_version" ]]; then
            changed=true
          fi

          is_pre_release=false
          if [[ "$version" == 0.* ]]; then
            is_pre_release=true
          fi

          {
            echo "version=$version"
            echo "changed=$changed"
            echo "is_pre_release=$is_pre_release"
            echo "tag_name=v$version"
          } >> "$GITHUB_OUTPUT"

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: check
    if: needs.check.outputs.version_changed == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci
      - run: npm run compile
      - run: npx vsce package --out modelflare.vsix ${{ needs.check.outputs.is_pre_release == 'true' && '--pre-release' || '' }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: error
          name: vsix
          path: ./modelflare.vsix

  publish-vsce:
    name: Publish to Microsoft Marketplace
    runs-on: ubuntu-latest
    needs: [check, build]
    if: needs.check.outputs.version_changed == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: vsix
      - run: npm exec --yes vsce publish --packagePath modelflare.vsix ${{ needs.check.outputs.is_pre_release == 'true' && '--pre-release' || '' }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PERSONAL_ACCESS_TOKEN }}

  publish-ovsx:
    name: Publish to Open VSX Registry
    runs-on: ubuntu-latest
    needs: [check, build]
    if: needs.check.outputs.version_changed == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: vsix
      - run: npx ovsx publish modelflare.vsix -p "$OVSX_PAT"
        env:
          OVSX_PAT: ${{ secrets.OPEN_VSX_TOKEN }}

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [check, build, publish-vsce, publish-ovsx]
    if: needs.check.outputs.version_changed == 'true'
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: vsix
      - uses: actions/github-script@v7
        env:
          VERSION: ${{ needs.check.outputs.version }}
          TAG_NAME: ${{ needs.check.outputs.tag_name }}
          IS_PRE_RELEASE: ${{ needs.check.outputs.is_pre_release }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const version = process.env.VERSION;
            const tagName = process.env.TAG_NAME;
            const prerelease = process.env.IS_PRE_RELEASE === 'true';
            const releaseName = `v${version}`;
            const compareBase = `https://github.com/${owner}/${repo}/compare`;

            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100,
            });
            const latestPublishedRelease = releases.find((release) => !release.draft && release.tag_name !== tagName);
            const body = latestPublishedRelease
              ? `Changes: [${latestPublishedRelease.tag_name}...${tagName}](${compareBase}/${latestPublishedRelease.tag_name}...${tagName})`
              : 'Initial release.';

            let release;
            try {
              release = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag: tagName,
              });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            if (release) {
              await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: release.data.id,
                tag_name: tagName,
                name: releaseName,
                body,
                prerelease,
              });
            } else {
              await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tagName,
                name: releaseName,
                body,
                prerelease,
                generate_release_notes: true,
                target_commitish: context.sha,
              });
            }

      - name: Upload VSIX to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check.outputs.tag_name }}
          files: modelflare.vsix
